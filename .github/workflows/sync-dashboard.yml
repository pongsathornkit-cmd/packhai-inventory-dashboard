name: Sync inventory dashboard

on:
  workflow_dispatch:
    inputs:
      sync_type:
        description: Sync job to run
        required: true
        default: all
        type: choice
        options:
          - all
          - packhai
          - flowaccount
          - seller
          - seller-payments
      payment_batch_size:
        description: Max new seller payment orders per run. Use 0 for all remaining orders.
        required: true
        default: "200"
        type: string
  schedule:
    # Public dashboard users do not run this manually. The schedule syncs all sources
    # at 09:00, 11:00, 13:00, 15:00, 17:00, 19:00 Thailand time.
    - cron: "0 2-13/2 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: packhai-sync-dashboard
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SELLER_HEADLESS: "1"
      SYNC_REQUIRE_KEY: "0"
      SELLER_ORDER_PAYMENT_MAX_NEW: ${{ github.event_name == 'schedule' && '200' || inputs.payment_batch_size || '200' }}
      PACKHAI_CLOUD_ENV_FILE: ${{ github.workspace }}/.tmp/github-actions-sync.env
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps chromium

      - name: Decrypt sync environment
        env:
          PACKHAI_SYNC_ENV_PASSPHRASE: ${{ secrets.PACKHAI_SYNC_ENV_PASSPHRASE }}
        run: |
          if [ ! -f ".github/sync-secrets/cloud-sync.env.enc" ]; then
            echo "Missing .github/sync-secrets/cloud-sync.env.enc. Run npm run sync:seal-env first." >&2
            exit 1
          fi
          if [ -z "$PACKHAI_SYNC_ENV_PASSPHRASE" ]; then
            echo "Missing GitHub secret PACKHAI_SYNC_ENV_PASSPHRASE." >&2
            exit 1
          fi
          node scripts/open-sealed-sync-env.cjs

      - name: Configure runtime paths
        run: |
          {
            echo "PACKHAI_DATA_DIR=$GITHUB_WORKSPACE/data"
            echo "PACKHAI_AUTH_STATE_DIR=$RUNNER_TEMP/packhai-auth-states"
            echo "FLOW_PROFILE=$RUNNER_TEMP/browser-profiles/flowaccount"
            echo "SHOPEE_SESSION_DIR=$RUNNER_TEMP/browser-profiles/shopee"
            echo "SELLER_SESSION_DIR=$RUNNER_TEMP/browser-profiles/lazada"
          } >> "$GITHUB_ENV"
          git config user.name "packhai-sync-bot"
          git config user.email "packhai-sync-bot@users.noreply.github.com"

      - name: Run sync
        run: node scripts/run-sync-job.cjs --type "${{ github.event_name == 'schedule' && 'all' || inputs.sync_type || 'seller-payments' }}"

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
