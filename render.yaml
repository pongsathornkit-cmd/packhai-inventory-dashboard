services:
  - type: web
    name: packhai-inventory-dashboard
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: packhai-sync-storage
      mountPath: /app/storage
      sizeGB: 5
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: SELLER_HEADLESS
        value: "1"
      - key: SYNC_REQUIRE_KEY
        value: "0"
      - key: PACKHAI_CLOUD_ENV_FILE
        value: /etc/secrets/cloud-sync.env
      - key: PACKHAI_DATA_DIR
        value: /app/storage/data
      - key: PACKHAI_AUTH_STATE_DIR
        value: /app/storage/auth-states
      - key: FLOW_PROFILE
        value: /app/storage/browser-profiles/flowaccount
      - key: SHOPEE_SESSION_DIR
        value: /app/storage/browser-profiles/shopee
      - key: SELLER_SESSION_DIR
        value: /app/storage/browser-profiles/lazada
      - key: PACKHAI_AUTH_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUBLIC_SUPABASE_URL
        sync: false
      - key: PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: PUBLIC_SYNC_API_BASE
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: SHOPEE_STORAGE_STATE_B64
        sync: false
      - key: LAZADA_STORAGE_STATE_B64
        sync: false
      - key: FLOWACCOUNT_STORAGE_STATE_B64
        sync: false
