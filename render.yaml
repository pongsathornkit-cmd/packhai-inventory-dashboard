services:
  - type: web
    name: packhai-inventory-dashboard
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: packhai-sync-storage
      mountPath: /app/storage
      sizeGB: 5
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: SELLER_HEADLESS
        value: "1"
      - key: SYNC_REQUIRE_KEY
        value: "0"
      - key: SYNC_PUBLISH_SUPABASE
        value: "1"
      - key: AUTO_SYNC_BUSY_RETRY_SECONDS
        value: "120"
      - key: AUTO_SYNC_SECONDARY_JOBS
        value: "1"
      - key: PACKHAI_AUTO_SYNC
        value: "1"
      - key: PACKHAI_AUTO_SYNC_INTERVAL_MINUTES
        value: "60"
      - key: PACKHAI_AUTO_SYNC_START_DELAY_SECONDS
        value: "60"
      - key: SELLER_PRICES_AUTO_SYNC
        value: "1"
      - key: SELLER_PRICES_AUTO_SYNC_INTERVAL_MINUTES
        value: "60"
      - key: SELLER_PRICES_AUTO_SYNC_START_DELAY_SECONDS
        value: "300"
      - key: SELLER_PAYMENTS_AUTO_SYNC
        value: "1"
      - key: SELLER_PAYMENTS_AUTO_SYNC_INTERVAL_MINUTES
        value: "60"
      - key: SELLER_PAYMENTS_AUTO_SYNC_START_DELAY_SECONDS
        value: "180"
      - key: SELLER_ORDER_PAYMENT_MAX_NEW
        value: "0"
      - key: SELLER_ORDER_PAYMENT_PROGRESS_EVERY
        value: "25"
      - key: SELLER_PAYMENTS_TIMEOUT_MS
        value: "21600000"
      - key: PACKHAI_CLOUD_ENV_FILE
        value: /etc/secrets/cloud-sync.env
      - key: PACKHAI_SYNC_ENV_PASSPHRASE
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-2
      - key: PACKHAI_DATA_DIR
        value: /app/storage/data
      - key: SELLER_COMPARE_DIR
        value: /app/storage/data/seller_compare
      - key: PACKHAI_AUTH_STATE_DIR
        value: /app/storage/auth-states
      - key: FLOW_PROFILE
        value: /app/storage/browser-profiles/flowaccount
      - key: SHOPEE_SESSION_DIR
        value: /app/storage/browser-profiles/shopee
      - key: SELLER_SESSION_DIR
        value: /app/storage/browser-profiles/lazada
