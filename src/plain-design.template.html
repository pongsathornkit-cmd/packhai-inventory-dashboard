<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PLAIN Design Hub | Packhai</title>
    <style>
/* __INLINE_PLAIN_STYLES__ */
    </style>
  </head>
  <body>
    <div class="plain-shell">
      <aside class="plain-sidebar">
        <a class="back-link" href="../">Packhai Dashboard</a>
        <div class="brand">
          <div class="brand-mark">P</div>
          <div>
            <strong>PLAIN</strong>
            <span>Design Hub</span>
          </div>
        </div>
        <nav class="plain-nav">
          <a href="#products">รายการสินค้า</a>
          <a href="#purchase-order">ใบสั่งซื้อ</a>
        </nav>
        <div class="storage-note">
          <span>Linked with Packhai</span>
          <strong id="linkedCount">-</strong>
        </div>
      </aside>

      <main class="plain-workspace">
        <header class="topbar">
          <div>
            <h1>งานรีดีไซน์สินค้า PLAIN</h1>
          </div>
          <div class="topbar-actions">
            <a class="secondary-button" href="../#inventory-detail">Packhai Stock</a>
            <button class="primary-button" id="refreshState" type="button">Refresh</button>
            <div class="designer-chip">
              <span>DS</span>
              <strong>Designer</strong>
              <small>ออกจากระบบ</small>
            </div>
          </div>
        </header>

        <section class="status-line" id="statusLine" hidden></section>
        <section class="stats-grid" id="summary"></section>

        <section class="controls" id="products">
          <label class="search-box">
            <span>ค้นหา</span>
            <input id="searchInput" type="search" placeholder="SKU หรือชื่อสินค้า" />
          </label>
          <label class="filter-select">
            <span>หมวด</span>
            <select id="categoryFilter"></select>
          </label>
          <label class="filter-select">
            <span>สถานะ</span>
            <select id="statusFilter"></select>
          </label>
          <button class="ghost-button clear-filters" id="clearFilters" type="button">ล้างตัวกรอง</button>
        </section>

        <section class="main-grid" id="plainMainGrid">
          <section class="product-panel">
            <div class="section-heading">
              <div>
                <h2>รายการสินค้า</h2>
                <span id="tableSubtitle">-</span>
              </div>
              <div class="product-panel-actions">
                <div class="product-table-mode-toggle" id="productTableModeToggle" aria-label="Product table mode">
                  <button type="button" data-product-table-mode="accounting" aria-pressed="false"><span class="table-mode-emoji" aria-hidden="true">💰</span>Accounting Expert</button>
                  <button type="button" data-product-table-mode="designer" aria-pressed="false"><span class="table-mode-emoji" aria-hidden="true">🎨</span>Designer Expert</button>
                  <button type="button" data-product-table-mode="combined" aria-pressed="true">Accounting&Design Mode</button>
                </div>
                <div class="product-image-mode-toggle" id="productImageModeToggle" aria-label="Product cover image mode">
                  <button type="button" data-product-image-mode="ktw" aria-pressed="true">KTW Mode</button>
                  <button type="button" data-product-image-mode="plain" aria-pressed="false">Plain Mode</button>
                </div>
                <button class="detail-panel-expand-button" id="detailPanelExpandButton" type="button" aria-controls="design" aria-expanded="false" hidden>แสดงรายละเอียด</button>
              </div>
            </div>
            <div class="bulk-status-bar" id="bulkStatusBar"></div>
            <div class="table-wrap">
              <table class="product-table">
                <thead>
                  <tr>
                    <th>สินค้า</th>
                    <th>ต้นทุน/ราคาขาย</th>
                    <th>ค่าส่ง/ชิ้น</th>
                    <th>กำไร</th>
                    <th>จำนวน</th>
                    <th>สถานะ</th>
                    <th>ไฟล์</th>
                  </tr>
                </thead>
                <tbody id="productRows"></tbody>
              </table>
            </div>
          </section>

          <aside class="detail-panel" id="design"></aside>
        </section>

        <section class="po-panel" id="purchase-order" hidden></section>
      </main>
    </div>

    <script>
/* __INLINE_PLAIN_DATA__ */
    </script>
    <script>
/* __INLINE_PLAIN_APP__ */
    </script>
  </body>
</html>
